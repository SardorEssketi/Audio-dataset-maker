services:
  backend:
    image: ghcr.io/sardoressketi/audio-dataset-maker-backend:latest
    pull_policy: always
    container_name: audio-pipeline-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/pipeline.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80,http://localhost:3000}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      # Avoid requiring curl/wget in the image.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/sardoressketi/audio-dataset-maker-frontend:latest
    pull_policy: always
    container_name: audio-pipeline-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
