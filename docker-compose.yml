services:
  caddy:
    image: caddy:2-alpine
    container_name: audio-pipeline-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/sardoressketi/audio-dataset-maker-backend:latest
    pull_policy: always
    container_name: audio-pipeline-backend
    environment:
      - DATABASE_URL=sqlite:///./data/pipeline.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      # Set this in `.env` for production, e.g. `https://your-domain.tld`.
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80,http://localhost:3000}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      # Avoid requiring curl/wget in the image.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/sardoressketi/audio-dataset-maker-frontend:latest
    pull_policy: always
    container_name: audio-pipeline-frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
  caddy_data:
  caddy_config:
